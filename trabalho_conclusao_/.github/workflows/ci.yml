name: Pipeline de Integração Contínua (CI) 💳

on:
  # Execução por push na branch main
  push:
    branches: [ main ]

  # Execução manual
  workflow_dispatch:

  # Execução agendada (Toda segunda-feira às 00:00 UTC)
  schedule:
    - cron: '0 0 * * 1'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Configura o ambiente Node.js com cache para acelerar execuções futuras
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Instala as dependências limpas do projeto usando o package-lock.json
      - name: Instalar dependências
        run: npm ci

      # Executa a bateria de testes automatizados e gera o relatório Mochawesome
      - name: Executar testes automatizados
        run: npm test

      # Armazena e publica o relatório de testes na pipeline como artefato
      # if: always() garante a publicação do relatório mesmo que ocorram falhas nos testes
      - name: Upload do relatório Mochawesome
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mochawesome-report
          path: mochawesome-report/
          retention-days: 30
